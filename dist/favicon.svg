<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#grad)" />

  <!-- Calendar/Era icon -->
  <g transform="translate(256, 256) scale(1.15) translate(-256, -256)" filter="url(#shadow)">
    <!-- Calendar body -->
    <rect x="120" y="140" width="272" height="256" rx="24" fill="white" opacity="0.95"/>

    <!-- Calendar header (red) -->
    <rect x="120" y="140" width="272" height="72" rx="24" fill="#EF4444"/>
    <rect x="120" y="180" width="272" height="32" fill="#EF4444"/>

    <!-- Calendar rings -->
    <rect x="172" y="128" width="16" height="40" rx="8" fill="white" opacity="0.9"/>
    <rect x="324" y="128" width="16" height="40" rx="8" fill="white" opacity="0.9"/>

    <!-- 和 character (Japanese era) -->
    <text x="256" y="320"
          font-size="130"
          font-weight="900"
          text-anchor="middle"
          fill="#1E40AF"
          font-family="'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif">和</text>
  </g>
</svg>
